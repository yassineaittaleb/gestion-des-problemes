<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technicien — Gestion des Problèmes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">GP</span>
            <h1>Gestion des Problèmes</h1>
            <button class="sidebar-toggle" title="Réduire/Agrandir">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="technicien-dashboard.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="9" width="7" height="12" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <a href="reclamations.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-label">Réclamations</span>
            </a>
            <div class="nav-spacer"></div>
            <a href="#" onclick="logout()" class="logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Déconnexion</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="sidebarUser"></span>
            <span class="sidebar-role" id="sidebarRole"></span>
        </div>
    </header>
    <div class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <h2 style="font-size:1rem;font-weight:700;">Tableau de Bord Technicien</h2>
            </div>
            <div class="topbar-right">
                <span class="role-badge role-tech">Technicien</span>
                <div class="topbar-avatar" id="avatarInitial">T</div>
            </div>
        </div>
        <main class="page-container">
            <div class="page-header">
                <div>
                    <p class="page-subtitle">Bienvenue, <strong id="welcomeName"></strong></p>
                </div>
            </div>

            <div class="stats">
                <div class="card card-accent" style="--card-accent: var(--warning);">
                    <h3>En Cours</h3>
                    <div class="value" id="statInProgress">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--success);">
                    <h3>Résolus</h3>
                    <div class="value" id="statResolved">0</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Activité mensuelle</h3>
                    <canvas id="techAreaChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Répartition par type</h3>
                    <canvas id="techPieChart"></canvas>
                </div>
            </div>

            <section class="card-section">
                <div class="section-header">
                    <h3>Mes Tickets en Cours</h3>
                    <span class="section-count" id="myCount">0</span>
                </div>
                <div id="myTicketsContainer">
                    <p class="empty-msg">Aucun ticket en cours.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/tickets.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/charts.js"></script>
    <script>
        const user = checkAuth(['technicien']);
        if (user) {
            $('welcomeName').textContent = user.name;
            $('sidebarUser').textContent = user.name;
            $('sidebarRole').textContent = 'Technicien';
            $('avatarInitial').textContent = user.name.charAt(0).toUpperCase();

            function loadMyTickets() {
                const tickets = getTechnicianTickets(user.name);
                const all = getTickets();
                const container = $('myTicketsContainer');
                $('myCount').textContent = tickets.length;
                $('statInProgress').textContent = all.filter(t => t.status === 'En cours').length;
                $('statResolved').textContent = all.filter(t => t.status === 'Resolu').length;
                if (tickets.length === 0) {
                    container.innerHTML = '<p class="empty-msg">Aucun ticket assigné.</p>';
                    return;
                }
                let html = '<div class="tickets-grid">';
                const tColors = { 'Soft': '#B30016', 'Hard': '#EA580C', 'Materiel': '#8B5CF6' };
                const sColors = { 'Ouvert': '#B30016', 'En cours': '#F59E0B', 'Resolu': '#16A34A', 'Escalade': '#DC2626' };
                tickets.forEach(t => {
                    html += '<div class="ticket-card">' +
                        '<div class="ticket-card-top" style="background:' + (sColors[t.status] || '#64748B') + '"></div>' +
                        '<div class="ticket-card-body">' +
                            '<div class="ticket-card-header">' +
                                '<span class="ticket-card-title">' + t.title + '</span>' +
                                '<span class="ticket-card-id">#' + t.id.toString().slice(-4) + '</span>' +
                            '</div>' +
                            '<div class="ticket-card-desc">' + t.description + '</div>' +
                            '<div class="ticket-card-meta">' +
                                '<span class="badge" style="background:' + (tColors[t.type] || '#64748B') + '">' + t.type + '</span>' +
                                '<span class="badge" style="background:' + (sColors[t.status] || '#64748B') + '">' + t.status + '</span>' +
                            '</div>' +
                            '<div class="ticket-card-footer">' +
                                '<span class="ticket-card-date">' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                                    t.createdAt +
                                '</span>' +
                                '<button class="btn-sm btn-success" onclick="solveTicket(' + t.id + ')">Résoudre</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                });
                html += '</div>';
                container.innerHTML = html;
            }

            window.solveTicket = function (id) {
                resolveTicket(id);
                loadMyTickets();
                drawCharts();
            };

            function drawCharts() {
                const all = getTickets();
                const months = ['Jan','Fév','Mar','Avr','Mai','Juin'];
                const monthly = months.map(() => 0);
                all.forEach(t => {
                    const parts = t.createdAt.split('/');
                    if (parts.length === 3) {
                        const m = parseInt(parts[1], 10) - 1;
                        if (m >= 0 && m < 6) monthly[m]++;
                    }
                });
                drawAreaChart('techAreaChart', { labels: months, values: monthly }, '#0EA5E9');

                const types = ['Soft', 'Hard', 'Materiel'];
                const tColors = ['#B30016', '#EA580C', '#8B5CF6'];
                const counts = types.map(tp => all.filter(t => t.type === tp).length);
                drawPieChart('techPieChart', { labels: types, values: counts }, tColors);
            }

            loadMyTickets();
            drawCharts();
        }
    </script>
</body>
</html>
