<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technicien - IT CONNECT</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="technicien-dashboard.html" class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="var(--primary)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="sidebar-title">IT CONNECT</span>
            </a>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="technicien-dashboard.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <a href="reclamations.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-label">Réclamations</span>
            </a>
                    <a href="technicien-profil.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Profil</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar" onclick="window.location.href='technicien-profil.html'" style="cursor:pointer;" title="Mon Profil">T</div>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" id="sidebarUser"></span>
                    <span class="sidebar-user-role" id="sidebarRole">Technicien</span>
                </div>
            </div>
            <a href="#" onclick="logout()" class="sidebar-logout" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="app-main">
                <header class="topbar">
            <div class="topbar-left" style="display:flex; align-items:center; gap:0.5rem; font-weight:800; color:var(--text); font-size:1.1rem;">
                <button class="topbar-menu-btn" onclick="toggleSidebar()" style="margin-right: 0.5rem; padding: 0.25rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <svg viewBox="0 0 28 28" fill="none" width="24"><path d="M14 1 L25.5 7 V14 C25.5 21 14 27 14 27 C14 27 2.5 21 2.5 14 V7 Z" fill="var(--primary)"/></svg>
                IT CONNECT
            </div>
            <div class="topbar-right" style="display:flex; align-items:center; gap:1.5rem;">
                <div style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">FR <span style="color: #cbd5e1;">/ AR</span></div>
                <div style="display:flex; gap:1rem;">
                    <div style="position:relative; cursor:pointer;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <span style="position:absolute; top:-5px; right:-5px; background:var(--primary); color:#fff; font-size:0.6rem; font-weight:bold; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center;">3</span>
                    </div>
                    <div style="position:relative; cursor:pointer;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span style="position:absolute; top:-5px; right:-5px; background:var(--primary); color:#fff; font-size:0.6rem; font-weight:bold; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center;">3</span>
                    </div>
                </div>
                <div class="topbar-avatar" id="topbarAvatar" style="width:36px; height:36px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; cursor:pointer;" onclick="logout()" title="Déconnexion">YE</div>
            </div>
        </header>
        <main>
            <div class="page-header">
                <div>
                    <h2>Tableau de Bord</h2>
                    <p class="page-subtitle">Bienvenue, <strong id="welcomeName"></strong> · Technicien</p>
                </div>
            </div>


            <!-- Chart Section -->
            <div class="card-section" style="padding:1.5rem; background:#fff; border-radius:12px; border:1px solid var(--border); margin-bottom:2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <h3 style="font-size:0.75rem; color:var(--text-secondary); font-weight:700; margin-bottom:1.5rem; text-transform:uppercase;">ACTIVITÉ DES TICKETS (14 JOURS)</h3>
                <div style="height: 250px; width: 100%;"><canvas id="techChart"></canvas></div>
            </div>

            <!-- Tickets Section (Page-like) -->
            <section style="background:#fff; border-radius:12px; border:1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow:hidden;">
                <!-- Tab Header -->
                <div style="display:flex; align-items:center; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border);">
                    <div style="display:flex; gap:0.5rem;">
                        <button id="tabAll" onclick="switchTechFilter('all')" style="padding:0.45rem 1rem; border-radius:20px; border:none; font-size:0.8rem; font-weight:600; cursor:pointer; background:var(--primary); color:#fff;">Tous <span id="techCountAll" style="background:rgba(255,255,255,0.25); padding:0 6px; border-radius:10px; margin-left:4px; font-size:0.7rem;">0</span></button>
                        <button id="tabOuvert" onclick="switchTechFilter('Ouvert')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">Ouverts</button>
                        <button id="tabEncours" onclick="switchTechFilter('En cours')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">En cours</button>
                        <button id="tabResolu" onclick="switchTechFilter('Resolu')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">Résolus</button>
                    </div>
                </div>
                <!-- Table Content -->
                <div id="myTicketsContainer" style="padding:0;"></div>
            </section>
        </main>
    </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/tickets.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/main.js"></script>
<script src="../js/ticketDetail.js"></script>
<script>
    const user = checkAuth(['technicien']);
    if (user) {
        $('welcomeName').textContent = user.name;
        $('sidebarUser').textContent = user.name;
        $('sidebarRole').textContent = 'Technicien';
        
        $('sidebarAvatar').textContent = user.name.charAt(0);

        var techPage = 1;
        var techPageSize = 12;
        var techFilter = 'all';

        function renderTechTable(tickets, container) {
            var page = techPage;
            var totalPages = Math.ceil(tickets.length / techPageSize) || 1;
            if (page > totalPages) page = totalPages;
            techPage = page;

            if (tickets.length === 0) {
                container.innerHTML = '<div style="padding:3rem; text-align:center; color:var(--text-muted); font-size:0.9rem;">Aucun ticket dans cette catégorie.</div>';
                return;
            }

            var paginated = tickets.slice((page - 1) * techPageSize, page * techPageSize);
            
            var html = '<table style="width:100%; border-collapse:collapse; font-size:0.85rem;">';
            html += '<thead><tr style="border-bottom:1px solid var(--border); text-align:left;"><th style="padding:0.75rem 1.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">N° TICKET</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">CLIENT</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">DATE</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">TYPE</th><th style="padding:0.75rem 1.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">STATUT</th></tr></thead><tbody>';
            paginated.forEach(function(t) {
                var initials = t.createdBy.split(' ').map(function(n){return n[0];}).join('').substring(0,2).toUpperCase();
                var colors = ['#b91c1c','#2563eb','#7c3aed','#d97706','#16a34a'];
                var bgColor = colors[Math.abs(t.id) % colors.length];
                var dateStr = t.createdAt.split(' ')[0];
                html += '<tr style="border-bottom:1px solid var(--border-light); transition:background 0.1s; cursor:pointer;" onmouseenter="this.style.background=\'var(--bg-alt)\'" onmouseleave="this.style.background=\'#fff\'" onclick="openTicketDetail(' + t.id + ', techDetailActions)">';
                html += '<td style="padding:0.85rem 1.5rem; font-weight:600; color:var(--text-secondary);">#' + t.id.toString().slice(-4) + '</td>';
                html += '<td style="padding:0.85rem 0.5rem;"><div style="display:flex; align-items:center; gap:0.65rem;"><div style="width:32px;height:32px;border-radius:50%;background:' + bgColor + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;">' + initials + '</div><div><div style="font-weight:600; color:var(--text);">' + t.createdBy + '</div><div style="font-size:0.75rem; color:var(--text-muted); margin-top:1px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + t.title + '</div></div></div></td>';
                html += '<td style="padding:0.85rem 0.5rem; color:var(--text-secondary);">' + dateStr + '</td>';
                html += '<td style="padding:0.85rem 0.5rem; color:var(--text-secondary);">' + t.type + '</td>';
                html += '<td style="padding:0.85rem 1.5rem;">' + getStatusBadge(t.status) + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table>';

            if (totalPages > 1) {
                html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-top:1px solid var(--border); background:#fff;">';
                html += '<span style="font-size:0.8rem; color:var(--text-muted);">Affichage de ' + (((page-1)*techPageSize)+1) + ' à ' + Math.min(page*techPageSize, tickets.length) + ' sur ' + tickets.length + ' tickets</span>';
                html += '<div style="display:flex; gap:0.25rem;">';
                html += '<button onclick="changeTechPage(' + (page-1) + ')" ' + (page===1?'disabled':'') + ' style="padding:0.4rem 0.75rem; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:'+(page===1?'default':'pointer')+'; color:var(--text-secondary); font-size:0.8rem;">Précédent</button>';
                
                var startP = Math.max(1, page - 2);
                var endP = Math.min(totalPages, page + 2);
                for(var p=startP; p<=endP; p++) {
                    var isAct = (p === page);
                    html += '<button onclick="changeTechPage(' + p + ')" style="padding:0.4rem 0.75rem; border:1px solid '+(isAct?'var(--primary)':'var(--border)')+'; border-radius:6px; background:'+(isAct?'var(--primary)':'#fff')+'; cursor:pointer; color:'+(isAct?'#fff':'var(--text-secondary)')+'; font-weight:'+(isAct?'700':'400')+'; font-size:0.8rem;">'+p+'</button>';
                }

                html += '<button onclick="changeTechPage(' + (page+1) + ')" ' + (page===totalPages?'disabled':'') + ' style="padding:0.4rem 0.75rem; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:'+(page===totalPages?'default':'pointer')+'; color:var(--text-secondary); font-size:0.8rem;">Suivant</button>';
                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        window.changeTechPage = function(newPage) {
            techPage = newPage;
            loadTechTickets();
        };

        window.switchTechFilter = function(status) {
            techFilter = status;
            var btns = ['tabAll','tabOuvert','tabEncours','tabResolu'];
            var map = { all:'tabAll', Ouvert:'tabOuvert', 'En cours':'tabEncours', Resolu:'tabResolu' };
            btns.forEach(function(id) {
                var b = document.getElementById(id);
                if (b) { b.style.background = '#fff'; b.style.color = 'var(--text-secondary)'; b.style.border = '1px solid var(--border)'; }
            });
            var active = document.getElementById(map[status]);
            if (active) { active.style.background = 'var(--primary)'; active.style.color = '#fff'; active.style.border = 'none'; }
            techPage = 1;
            loadTechTickets();
        };

        var techDetailActions = function(t) {
            var html = '';
            if (t.status === 'En cours' && t.assignedTo === user.name) {
                html += '<button class="td-btn td-btn-success" onclick="techSolveTicket(' + t.id + '); closeTicketDetail();" style="background:#16a34a; color:#fff; border:none;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Résoudre</button>';
            }
            return html;
        };

        window.techSolveTicket = function(id) {
            var tickets = getTickets();
            for (var i = 0; i < tickets.length; i++) {
                if (tickets[i].id === id && tickets[i].assignedTo === user.name) {
                    tickets[i].status = 'Resolu';
                    break;
                }
            }
            saveTickets(tickets);
            loadTechTickets();
        };

        function loadTechTickets() {
            var all = getTickets().filter(function(t) { return t.assignedTo === user.name; });
            $('techCountAll').textContent = all.length;
            var filtered = techFilter === 'all' ? all : all.filter(function(t) { return t.status === techFilter; });
            renderTechTable(filtered, $('myTicketsContainer'));
        }

        loadTechTickets();

        // Draw chart
        var all = getTickets();
        var ctx = document.getElementById('techChart');
        if (ctx && typeof Chart !== 'undefined') {
            var days = 14, now = new Date(), created = new Array(days).fill(0), labels = [];
            for (var i = days-1; i >= 0; i--) { var d = new Date(now); d.setDate(d.getDate()-i); labels.push(d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})); }
            all.forEach(function(t) { var p = t.createdAt.split(' ')[0].split('/'); if(p.length===3){ var dd=Math.floor((now-new Date(p[2],p[1]-1,p[0]))/86400000); if(dd>=0&&dd<days) created[days-1-dd]++; } });
            var g = ctx.getContext('2d'), grad = g.createLinearGradient(0,0,0,250); grad.addColorStop(0,'rgba(185,28,28,0.3)'); grad.addColorStop(1,'rgba(185,28,28,0)');
            new Chart(g, { type:'line', data:{ labels:labels, datasets:[{label:'Tickets',data:created,borderColor:'#b91c1c',backgroundColor:grad,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#fff',pointBorderColor:'#b91c1c',fill:true,tension:0.4}] }, options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'}},x:{grid:{display:false}}} } });
        }
    }
</script>
</body>
</html>
