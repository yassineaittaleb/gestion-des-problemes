<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postes - Gestion des Problèmes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" id="dashboardLink" class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="var(--primary)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="sidebar-title">Gestion des Problèmes</span>
            </a>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" id="dashboardLink2" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <a href="postes.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span class="nav-label">Postes</span>
            </a>
            <a href="utilisateurs.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Utilisateurs</span>
            </a>
            <a href="reclamations.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-label">Réclamations</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar">P</div>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" id="sidebarUser"></span>
                    <span class="sidebar-user-role" id="sidebarRole"></span>
                </div>
            </div>
            <a href="#" onclick="logout()" class="sidebar-logout" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="app-main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-menu-btn" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="topbar-title">Postes de Travail</h1>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <span class="topbar-user-name" id="topbarName"></span>
                    <span class="topbar-user-role" id="topbarRole"></span>
                </div>
                <a href="#" onclick="logout()" class="topbar-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Déconnexion
                </a>
            </div>
        </header>
        <main>
            <div class="page-header">
                <h2>Postes de Travail</h2>
                <span class="section-count" id="posteCount">0</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Poste</th>
                        <th>Département</th>
                        <th>Utilisateur</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody id="postesTableBody">
                </tbody>
            </table>
        </main>
    </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script>
    const user = checkAuth(['technicien', 'ingenieur', 'chef']);
    if (user) {
        $('sidebarUser').textContent = user.name;
        $('sidebarRole').textContent = roleInfo[user.role].label;
        $('sidebarAvatar').textContent = user.name.charAt(0);
        $('topbarName').textContent = user.name;
        $('topbarRole').textContent = roleInfo[user.role].label;
        $('dashboardLink').href = roleInfo[user.role].dashboard;
        $('dashboardLink2').href = roleInfo[user.role].dashboard;

        const postes = [
            { id: 'P-001', nom: 'Poste Direction', dept: 'Direction', user: 'Ahmed Benali', status: 'Actif' },
            { id: 'P-002', nom: 'Poste Comptabilité 1', dept: 'Comptabilité', user: 'Fatima Zahra', status: 'Actif' },
            { id: 'P-003', nom: 'Poste Comptabilité 2', dept: 'Comptabilité', user: '—', status: 'Maintenance' },
            { id: 'P-004', nom: 'Poste RH', dept: 'Ressources Humaines', user: 'Sara Ouazzani', status: 'Actif' },
            { id: 'P-005', nom: 'Poste Technique 1', dept: 'IT', user: 'Karim El Fassi', status: 'Actif' },
            { id: 'P-006', nom: 'Poste Technique 2', dept: 'IT', user: 'Youssef Lamrani', status: 'Actif' },
            { id: 'P-007', nom: 'Poste Accueil', dept: 'Administration', user: '—', status: 'Actif' },
            { id: 'P-008', nom: 'Poste Réunion', dept: 'Salle de Réunion', user: '—', status: 'En panne' },
        ];
        const tbody = $('postesTableBody');
        $('posteCount').textContent = postes.length;
        const sClass = { 'Actif': 'badge-resolu', 'Maintenance': 'badge-en-cours', 'En panne': 'badge-escalade' };
        postes.forEach(p => {
            tbody.innerHTML += '<tr><td>' + p.id + '</td><td>' + p.nom + '</td><td>' + p.dept + '</td><td>' + p.user + '</td><td><span class="badge ' + (sClass[p.status] || '') + '">' + p.status + '</span></td></tr>';
        });
    }
</script>
</body>
</html>
