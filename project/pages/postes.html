<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postes - Gestion des Problemes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="sidebar-header">
            <span class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <defs><linearGradient id="sgp" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2c3e50"/></linearGradient></defs>
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="url(#sgp)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </span>
            <h1>Gestion<br>des Problemes</h1>
        </div>
        <nav>
            <a href="#" id="dashboardLink">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="4" rx="1"/><rect x="13" y="9" width="8" height="12" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/></svg>
                Tableau de Bord
            </a>
            <a href="postes.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Postes
            </a>
            <a href="utilisateurs.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Utilisateurs
            </a>
            <a href="reclamations.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Reclamations
            </a>
            <div class="nav-spacer"></div>
            <a href="#" onclick="logout()" class="logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Deconnexion
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="sidebarUser"></span>
            <span class="sidebar-role" id="sidebarRole"></span>
        </div>
    </header>
    <main>
        <div class="page-header">
            <h2>Postes de Travail</h2>
            <span class="section-count" id="posteCount">0</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Poste</th>
                    <th>Departement</th>
                    <th>Utilisateur</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="postesTableBody">
            </tbody>
        </table>
    </main>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const user = checkAuth(['technicien', 'ingenieur', 'chef']);
        if (user) {
            $('sidebarUser').textContent = user.name;
            $('sidebarRole').textContent = roleInfo[user.role].label;
            $('dashboardLink').href = roleInfo[user.role].dashboard;

            const postes = [
                { id: 'P-001', nom: 'Poste Direction', dept: 'Direction', user: 'Ahmed Benali', status: 'Actif' },
                { id: 'P-002', nom: 'Poste Comptabilite 1', dept: 'Comptabilite', user: 'Fatima Zahra', status: 'Actif' },
                { id: 'P-003', nom: 'Poste Comptabilite 2', dept: 'Comptabilite', user: '—', status: 'Maintenance' },
                { id: 'P-004', nom: 'Poste RH', dept: 'Ressources Humaines', user: 'Sara Ouazzani', status: 'Actif' },
                { id: 'P-005', nom: 'Poste Technique 1', dept: 'IT', user: 'Karim El Fassi', status: 'Actif' },
                { id: 'P-006', nom: 'Poste Technique 2', dept: 'IT', user: 'Youssef Lamrani', status: 'Actif' },
                { id: 'P-007', nom: 'Poste Accueil', dept: 'Administration', user: '—', status: 'Actif' },
                { id: 'P-008', nom: 'Poste Reunion', dept: 'Salle de Reunion', user: '—', status: 'En panne' },
            ];
            const tbody = $('postesTableBody');
            $('posteCount').textContent = postes.length;
            const sColor = { 'Actif': '#27ae60', 'Maintenance': '#f39c12', 'En panne': '#e74c3c' };
            postes.forEach(p => {
                tbody.innerHTML += '<tr><td>' + p.id + '</td><td>' + p.nom + '</td><td>' + p.dept + '</td><td>' + p.user + '</td><td><span class="badge" style="background:' + (sColor[p.status] || '#95a5a6') + '">' + p.status + '</span></td></tr>';
            });
        }
    </script>
</body>
</html>
