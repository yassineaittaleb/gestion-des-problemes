<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Departement - Gestion des Problemes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="sidebar-header">
            <span class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <defs><linearGradient id="sgc" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2c3e50"/></linearGradient></defs>
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="url(#sgc)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </span>
            <h1>Gestion<br>des Problemes</h1>
        </div>
        <nav>
            <a href="chef-dashboard.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="4" rx="1"/><rect x="13" y="9" width="8" height="12" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/></svg>
                Tableau de Bord
            </a>
            <a href="utilisateurs.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Utilisateurs
            </a>
            <a href="reclamations.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Reclamations
            </a>
            <div class="nav-spacer"></div>
            <a href="#" onclick="logout()" class="logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Deconnexion
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="sidebarUser"></span>
            <span class="sidebar-role" id="sidebarRole"></span>
        </div>
    </header>
    <main>
        <div class="page-header">
            <div>
                <h2>Tableau de Bord</h2>
                <p class="page-subtitle">Bienvenue, <strong id="welcomeName"></strong> · Chef Departement</p>
            </div>
        </div>

        <div class="stats">
            <div class="card card-accent" style="--card-accent: var(--primary);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="16" width="8" height="14" rx="2" fill="#3b82f6" opacity=".5"/><rect x="14" y="10" width="8" height="20" rx="2" fill="#3b82f6" opacity=".7"/><rect x="26" y="4" width="8" height="26" rx="2" fill="#3b82f6"/></svg></div>
                <h3>Utilisateurs</h3><div class="value" id="statUsers">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--success);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="12" width="8" height="18" rx="2" fill="#22c55e" opacity=".5"/><rect x="14" y="8" width="8" height="22" rx="2" fill="#22c55e" opacity=".7"/><rect x="26" y="2" width="8" height="28" rx="2" fill="#22c55e"/></svg></div>
                <h3>Techniciens</h3><div class="value" id="statTechs">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--warning);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="18" width="8" height="12" rx="2" fill="#f59e0b" opacity=".5"/><rect x="14" y="10" width="8" height="20" rx="2" fill="#f59e0b" opacity=".7"/><rect x="26" y="6" width="8" height="24" rx="2" fill="#f59e0b"/></svg></div>
                <h3>Ingenieurs</h3><div class="value" id="statEngs">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--text-muted);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="16" width="8" height="14" rx="2" fill="#94a3b8" opacity=".5"/><rect x="14" y="10" width="8" height="20" rx="2" fill="#94a3b8" opacity=".7"/><rect x="26" y="4" width="8" height="26" rx="2" fill="#94a3b8"/></svg></div>
                <h3>Total Tickets</h3><div class="value" id="statTotal">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--primary);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="14" width="8" height="16" rx="2" fill="#3b82f6" opacity=".5"/><rect x="14" y="8" width="8" height="22" rx="2" fill="#3b82f6" opacity=".7"/><rect x="26" y="18" width="8" height="12" rx="2" fill="#3b82f6"/></svg></div>
                <h3>Ouverts</h3><div class="value" id="statOpen">0</div>
            </div>
        </div>
        <div class="stats">
            <div class="card card-accent" style="--card-accent: var(--warning);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="18" width="8" height="12" rx="2" fill="#f59e0b" opacity=".5"/><rect x="14" y="12" width="8" height="18" rx="2" fill="#f59e0b" opacity=".7"/><rect x="26" y="6" width="8" height="24" rx="2" fill="#f59e0b"/></svg></div>
                <h3>En Cours</h3><div class="value" id="statProgress">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--success);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="20" width="8" height="10" rx="2" fill="#22c55e" opacity=".5"/><rect x="14" y="14" width="8" height="16" rx="2" fill="#22c55e" opacity=".7"/><rect x="26" y="8" width="8" height="22" rx="2" fill="#22c55e"/></svg></div>
                <h3>Resolus</h3><div class="value" id="statResolved">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--red);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="6" width="8" height="24" rx="2" fill="#ef4444" opacity=".5"/><rect x="14" y="20" width="8" height="10" rx="2" fill="#ef4444" opacity=".7"/><rect x="26" y="12" width="8" height="18" rx="2" fill="#ef4444"/></svg></div>
                <h3>Escalades</h3><div class="value" id="statEscalated">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--primary);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="8" width="8" height="22" rx="2" fill="#3b82f6" opacity=".5"/><rect x="14" y="16" width="8" height="14" rx="2" fill="#3b82f6" opacity=".7"/><rect x="26" y="12" width="8" height="18" rx="2" fill="#3b82f6"/></svg></div>
                <h3>Soft</h3><div class="value" id="statSoft">0</div>
            </div>
            <div class="card card-accent" style="--card-accent: var(--purple);">
                <div class="stat-chart"><svg viewBox="0 0 40 32"><rect x="2" y="10" width="8" height="20" rx="2" fill="#8b5cf6" opacity=".5"/><rect x="14" y="4" width="8" height="26" rx="2" fill="#8b5cf6" opacity=".7"/><rect x="26" y="14" width="8" height="16" rx="2" fill="#8b5cf6"/></svg></div>
                <h3>Hard</h3><div class="value" id="statHard">0</div>
            </div>
        </div>

        <section class="card-section">
            <div class="section-header">
                <h3>Tous les Tickets</h3>
                <span class="section-count" id="ticketCount">0</span>
            </div>
            <div id="allTicketsContainer">
                <p class="empty-msg">Aucun ticket.</p>
            </div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/tickets.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const user = checkAuth(['chef']);
        if (user) {
            $('welcomeName').textContent = user.name;
            $('sidebarUser').textContent = user.name;
            $('sidebarRole').textContent = 'Chef Departement';

            function loadAllTickets() {
                const tickets = getTickets();
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const container = $('allTicketsContainer');
                $('ticketCount').textContent = tickets.length;
                $('statTotal').textContent = tickets.length;
                $('statOpen').textContent = tickets.filter(t => t.status === 'Ouvert').length;
                $('statProgress').textContent = tickets.filter(t => t.status === 'En cours').length;
                $('statResolved').textContent = tickets.filter(t => t.status === 'Resolu').length;
                $('statEscalated').textContent = tickets.filter(t => t.status === 'Escalade').length;
                $('statUsers').textContent = users.filter(u => u.role === 'utilisateur').length;
                $('statTechs').textContent = users.filter(u => u.role === 'technicien').length;
                $('statEngs').textContent = users.filter(u => u.role === 'ingenieur').length;
                $('statSoft').textContent = tickets.filter(t => t.type === 'Soft').length;
                $('statHard').textContent = tickets.filter(t => t.type === 'Hard' || t.type === 'Materiel').length;

                const techs = users.filter(u => u.role === 'technicien');

                if (tickets.length === 0) {
                    container.innerHTML = '<p class="empty-msg">Aucun ticket.</p>';
                    return;
                }
                let html = '<div class="tickets-table"><div class="tickets-header"><span>ID</span><span>Titre</span><span>Cree par</span><span>Type</span><span>Niveau</span><span>Statut</span><span>Technicien</span><span>Action</span></div>';
                tickets.forEach(t => {
                    let assignHtml = t.assignedTo || '—';
                    if (t.status === 'Ouvert') {
                        assignHtml = '<select id="assignSelect_' + t.id + '" class="assign-select">' +
                            '<option value="">— Choisir —</option>';
                        techs.forEach(tech => {
                            assignHtml += '<option value="' + tech.name + '">' + tech.name + '</option>';
                        });
                        assignHtml += '</select>' +
                            '<button class="btn-sm btn-primary" onclick="assignTicket(' + t.id + ')">Assigner</button>';
                    }
                    html += '<div class="ticket-row">' +
                        '<span class="ticket-id">#' + t.id.toString().slice(-4) + '</span>' +
                        '<span><strong>' + t.title + '</strong><span class="ticket-desc">' + t.description + '</span></span>' +
                        '<span class="ticket-author">' + t.createdBy + '</span>' +
                        '<span>' + t.type + '</span>' +
                        '<span>' + t.level + '</span>' +
                        '<span>' + getStatusBadge(t.status) + '</span>' +
                        '<span>' + (t.assignedTo || '—') + '</span>' +
                        '<span>' + assignHtml + '</span>' +
                    '</div>';
                });
                html += '</div>';
                container.innerHTML = html;
            }

            window.assignTicket = function(id) {
                const select = document.getElementById('assignSelect_' + id);
                const techName = select.value;
                if (!techName) return alert('Veuillez choisir un technicien.');
                takeTicket(id, techName);
                loadAllTickets();
            };

            loadAllTickets();
        }
    </script>
</body>
</html>
