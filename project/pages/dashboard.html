<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection — Gestion des Problèmes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main style="display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;margin-left:0;text-align:center;">
        <div>
            <h2 style="margin-bottom:0.5rem;">Redirection...</h2>
            <p style="color:var(--text-secondary);">Veuillez patienter.</p>
        </div>
    </main>
    <script src="../js/auth.js"></script>
    <script>
        const user = getCurrentUser();
        if (user && roleInfo[user.role]) {
            window.location.href = roleInfo[user.role].dashboard;
        } else {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
