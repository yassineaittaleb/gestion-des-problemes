<div class="modal-overlay" id="techModal">

<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script>
    const user = checkAuth(['technicien', 'ingenieur', 'chef']);
    if (user) {
        $('sidebarUser').textContent = user.name;
        $('sidebarRole').textContent = roleInfo[user.role].label;
        $('sidebarAvatar').textContent = user.name.charAt(0);
        $('topbarName').textContent = user.name;
        $('topbarRole').textContent = roleInfo[user.role].label;
        $('dashboardLink').href = roleInfo[user.role].dashboard;
        $('dashboardLink2').href = roleInfo[user.role].dashboard;

        var profilMap = { utilisateur:'user-profil.html', technicien:'technicien-profil.html', ingenieur:'ingenieur-profil.html', chef:'chef-profil.html' };
        if ($('profilLink')) $('profilLink').href = profilMap[user.role] || 'user-profil.html';

        if (user.role === 'ingenieur' || user.role === 'chef') {
            $('addTechBtn').style.display = '';
        }
        if (user.role === 'chef') {
            $('addEngBtn').style.display = '';
        }

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const tbody = $('usersTableBody');
            $('userCount').textContent = users.length;
            tbody.innerHTML = '';
            const labels = { utilisateur: 'Utilisateur', technicien: 'Technicien', ingenieur: 'Ingénieur', chef: 'Chef Département' };
            const classes = { utilisateur: 'role-user', technicien: 'role-tech', ingenieur: 'role-eng', chef: 'role-chef' };
            users.forEach(u => {
                tbody.innerHTML += '<tr><td>' + u.name + '</td><td>' + u.username + '</td><td><span class="role-badge ' + (classes[u.role] || '') + '" style="padding:0.2rem 0.6rem;font-size:0.75rem;">' + (labels[u.role] || u.role) + '</span></td></tr>';
            });
        }

        window.selectSpec = function(element, hiddenInputId) {
            var siblings = element.parentNode.children;
            for (var i = 0; i < siblings.length; i++) {
                siblings[i].style.borderColor = 'var(--border)';
                siblings[i].style.background = '#fff';
            }
            element.style.borderColor = 'var(--primary)';
            element.style.background = 'var(--bg-alt)';
            document.getElementById(hiddenInputId).value = element.getAttribute('data-spec');
        };

        window.openTechModal = function() {
            $('techModal').classList.add('active');
        };
        window.closeTechModal = function() {
            $('techModal').classList.remove('active');
        };
        window.handleAddTech = function(e) {
            e.preventDefault();
            const name = $('techName').value.trim();
            const username = $('techUsername').value.trim();
            const pass = $('techPass').value.trim();
            const spec = $('techSpec').value;
            
            if (!spec) {
                $('addTechMsg').textContent = 'Veuillez choisir une spécialité.';
                $('addTechMsg').className = 'error-msg';
                return;
            }
            
            if (addUser(username, pass, 'technicien', name, spec)) {
                $('addTechMsg').textContent = 'Technicien ' + name + ' ajouté avec succès.';
                $('addTechMsg').className = 'success-msg';
                $('addTechForm').reset();
                $('techSpec').value = '';
                var specs = document.getElementById('techSpecGrid').children;
                for (var i=0; i<specs.length; i++) {
                    specs[i].style.borderColor = 'var(--border)';
                    specs[i].style.background = '#fff';
                }
                loadUsers();
                setTimeout(closeTechModal, 1000);
            } else {
                $('addTechMsg').textContent = 'Ce nom d\'utilisateur existe déjà.';
                $('addTechMsg').className = 'error-msg';
            }
        };

        window.openEngModal = function() {
            $('engModal').classList.add('active');
        };
        window.closeEngModal = function() {
            $('engModal').classList.remove('active');
        };
        window.handleAddEng = function(e) {
            e.preventDefault();
            const name = $('engName').value.trim();
            const username = $('engUsername').value.trim();
            const pass = $('engPass').value.trim();
            const spec = $('engSpec').value;
            
            if (!spec) {
                $('addEngMsg').textContent = 'Veuillez choisir une spécialité.';
                $('addEngMsg').className = 'error-msg';
                return;
            }

            if (addUser(username, pass, 'ingenieur', name, spec)) {
                $('addEngMsg').textContent = 'Ingénieur ' + name + ' ajouté avec succès.';
                $('addEngMsg').className = 'success-msg';
                $('addEngForm').reset();
                $('engSpec').value = '';
                var specs = document.getElementById('engSpecGrid').children;
                for (var i=0; i<specs.length; i++) {
                    specs[i].style.borderColor = 'var(--border)';
                    specs[i].style.background = '#fff';
                }
                loadUsers();
                setTimeout(closeEngModal, 1000);
            } else {
                $('addEngMsg').textContent = 'Ce nom d\'utilisateur existe déjà.';
                $('addEngMsg').className = 'error-msg';
            }
        };

        loadUsers();
    }
</script>
</body>
</html>
