<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réclamations — Gestion des Problèmes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">GP</span>
            <h1>Gestion des Problèmes</h1>
            <button class="sidebar-toggle" title="Réduire/Agrandir">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" id="dashboardLink">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="9" width="7" height="12" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <a href="utilisateurs.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Utilisateurs</span>
            </a>
            <a href="reclamations.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-label">Réclamations</span>
            </a>
            <a href="postes.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span class="nav-label">Postes</span>
            </a>
            <div class="nav-spacer"></div>
            <a href="#" onclick="logout()" class="logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Déconnexion</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="sidebarUser"></span>
            <span class="sidebar-role" id="sidebarRole"></span>
        </div>
    </header>
    <div class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <h2 style="font-size:1rem;font-weight:700;">Réclamations</h2>
            </div>
            <div class="topbar-right">
                <div class="topbar-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                </div>
                <span class="section-count" id="ticketCount">0</span>
                <div class="topbar-avatar" id="avatarInitial">R</div>
            </div>
        </div>
        <main class="page-container">
            <div class="stats">
                <div class="card card-accent" style="--card-accent: var(--text-muted);">
                    <h3>Total</h3>
                    <div class="value" id="statTotal">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--primary);">
                    <h3>Ouverts</h3>
                    <div class="value" id="statOuvert">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--success);">
                    <h3>Résolus</h3>
                    <div class="value" id="statResolu">0</div>
                </div>
            </div>

            <section class="card-section">
                <div class="section-header">
                    <h3>Tous les tickets</h3>
                </div>
                <div id="allTicketsContainer">
                    <div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>Aucune réclamation.</p></div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/tickets.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        const user = checkAuth(['technicien', 'ingenieur', 'chef']);
        if (user) {
            $('sidebarUser').textContent = user.name;
            $('sidebarRole').textContent = roleInfo[user.role].label;
            $('dashboardLink').href = roleInfo[user.role].dashboard;
            $('avatarInitial').textContent = user.name.charAt(0).toUpperCase();

            function renderTickets(filter) {
                const tickets = getTickets();
                const container = $('allTicketsContainer');
                $('ticketCount').textContent = tickets.length;
                $('statTotal').textContent = tickets.length;
                $('statOuvert').textContent = tickets.filter(t => t.status === 'Ouvert').length;
                $('statResolu').textContent = tickets.filter(t => t.status === 'Resolu').length;

                const filtered = filter
                    ? tickets.filter(t =>
                        t.title.toLowerCase().includes(filter) ||
                        t.description.toLowerCase().includes(filter) ||
                        t.createdBy.toLowerCase().includes(filter) ||
                        t.id.toString().includes(filter)
                    )
                    : tickets;

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="empty-msg">' + (filter ? 'Aucun résultat pour "' + filter + '".' : 'Aucune réclamation.') + '</div>';
                    return;
                }
                let html = '<div class="tickets-table"><div class="tickets-header"><span>ID</span><span>Titre</span><span>Auteur</span><span>Statut</span><span>Date</span></div>';
                const sColors = { 'Ouvert': '#B30016', 'En cours': '#F59E0B', 'Resolu': '#16A34A', 'Escalade': '#DC2626' };
                filtered.forEach(t => {
                    html += '<div class="ticket-row">' +
                        '<span class="ticket-id">#' + t.id.toString().slice(-4) + '</span>' +
                        '<span><strong>' + t.title + '</strong><span class="ticket-desc">' + t.description + '</span></span>' +
                        '<span class="ticket-author">' + t.createdBy + '</span>' +
                        '<span><span class="badge" style="background:' + (sColors[t.status] || '#64748B') + '">' + t.status + '</span></span>' +
                        '<span class="ticket-date">' + t.createdAt + '</span>' +
                    '</div>';
                });
                html += '</div>';
                container.innerHTML = html;
            }

            let searchTimeout;
            $('searchInput').addEventListener('input', function () {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => renderTickets(this.value.toLowerCase().trim()), 200);
            });

            renderTickets();
        }
    </script>
</body>
</html>
