<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réclamations - IT CONNECT</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" id="dashboardLink" class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="var(--primary)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="sidebar-title">IT CONNECT</span>
            </a>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" id="dashboardLink2" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <a href="utilisateurs.html" id="usersLink" class="nav-item" style="display:none;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Utilisateurs</span>
            </a>
            <a href="reclamations.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-label">Réclamations</span>
            </a>
            <a href="#" id="profilLink" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Profil</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar">R</div>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" id="sidebarUser"></span>
                    <span class="sidebar-user-role" id="sidebarRole"></span>
                </div>
            </div>
            <a href="#" onclick="logout()" class="sidebar-logout" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="app-main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-menu-btn" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="topbar-title">Réclamations</h1>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <span class="topbar-user-name" id="topbarName"></span>
                    <span class="topbar-user-role" id="topbarRole"></span>
                </div>
                <a href="#" onclick="logout()" class="topbar-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Déconnexion
                </a>
            </div>
        </header>
        <main>
            <div class="page-header">
                <h2>Réclamations</h2>
                <div class="page-actions">
                    <span class="section-count" id="ticketCount">0</span>
                </div>
            </div>

            <div class="stats">
                <div class="card card-accent" style="--card-accent: var(--text-muted);">
                    <h3>Total</h3>
                    <div class="value" id="statTotal">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--primary);">
                    <h3>Ouverts</h3>
                    <div class="value" id="statOuvert">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--success);">
                    <h3>Résolus</h3>
                    <div class="value" id="statResolu">0</div>
                </div>
            </div>

            <section class="card-section">
                <div class="section-header">
                    <h3>Tous les tickets</h3>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-muted);pointer-events:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="searchInput" class="search-box" placeholder="Rechercher..." style="padding-left:28px;">
                    </div>
                </div>
                <div id="allTicketsContainer">
                    <div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>Aucune réclamation.</p></div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/tickets.js"></script>
<script src="../js/main.js"></script>
<script>
    const user = checkAuth(['technicien', 'ingenieur', 'chef']);
    if (user) {
        $('sidebarUser').textContent = user.name;
        $('sidebarRole').textContent = roleInfo[user.role].label;
        $('sidebarAvatar').textContent = user.name.charAt(0);
        $('topbarName').textContent = user.name;
        $('topbarRole').textContent = roleInfo[user.role].label;
        $('dashboardLink').href = roleInfo[user.role].dashboard;
        $('dashboardLink2').href = roleInfo[user.role].dashboard;

        // Set profil link
        var profilMap = { utilisateur:'user-profil.html', technicien:'technicien-profil.html', ingenieur:'ingenieur-profil.html', chef:'chef-profil.html' };
        if ($('profilLink')) $('profilLink').href = profilMap[user.role] || 'user-profil.html';

        if (user.role === 'chef' || user.role === 'ingenieur') {
            $('usersLink').style.display = '';
        }

        function renderTickets(filter) {
            const tickets = getTickets();
            const container = $('allTicketsContainer');
            $('ticketCount').textContent = tickets.length;
            $('statTotal').textContent = tickets.length;
            $('statOuvert').textContent = tickets.filter(t => t.status === 'Ouvert').length;
            $('statResolu').textContent = tickets.filter(t => t.status === 'Resolu').length;

            const filtered = filter
                ? tickets.filter(t =>
                    t.title.toLowerCase().includes(filter) ||
                    t.description.toLowerCase().includes(filter) ||
                    t.createdBy.toLowerCase().includes(filter) ||
                    t.id.toString().includes(filter)
                )
                : tickets;

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>' + (filter ? 'Aucun résultat pour "' + filter + '".' : 'Aucune réclamation.') + '</p></div>';
                return;
            }
            let html = '<div class="tickets-table"><div class="tickets-header"><span>ID</span><span>Titre</span><span>Auteur</span><span>Statut</span><span>Date</span></div>';
            filtered.forEach(t => {
                html += '<div class="ticket-row">' +
                    '<span class="ticket-id">#' + t.id.toString().slice(-4) + '</span>' +
                    '<span><strong>' + t.title + '</strong><span class="ticket-desc">' + t.description + '</span></span>' +
                    '<span class="ticket-author">' + t.createdBy + '</span>' +
                    '<span>' + getStatusBadge(t.status) + '</span>' +
                    '<span class="ticket-date">' + t.createdAt + '</span>' +
                '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        let searchTimeout;
        $('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => renderTickets(this.value.toLowerCase().trim()), 200);
        });

        renderTickets();
    }
</script>
</body>
</html>
