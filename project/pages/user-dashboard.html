<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilisateur - IT CONNECT</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="user-dashboard.html" class="sidebar-logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <path d="M32 2 L58 14 V32 C58 48 32 62 32 62 C32 62 6 48 6 32 V14 Z" fill="var(--primary)"/>
                    <path d="M22 32 L30 42 L44 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="sidebar-title">IT CONNECT</span>
            </a>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="user-dashboard.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
                    <a href="user-profil.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Profil</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar" onclick="window.location.href='user-profil.html'" style="cursor:pointer;" title="Mon Profil">U</div>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" id="sidebarUser"></span>
                    <span class="sidebar-user-role" id="sidebarRole">Utilisateur</span>
                </div>
            </div>
            <a href="#" onclick="logout()" class="sidebar-logout" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="app-main">
                <header class="topbar">
            <div class="topbar-left" style="display:flex; align-items:center; gap:0.5rem; font-weight:800; color:var(--text); font-size:1.1rem;">
                <button class="topbar-menu-btn" onclick="toggleSidebar()" style="margin-right: 0.5rem; padding: 0.25rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <svg viewBox="0 0 28 28" fill="none" width="24"><path d="M14 1 L25.5 7 V14 C25.5 21 14 27 14 27 C14 27 2.5 21 2.5 14 V7 Z" fill="var(--primary)"/></svg>
                IT CONNECT
            </div>
            <div class="topbar-right" style="display:flex; align-items:center; gap:1.5rem;">
                <div style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">FR <span style="color: #cbd5e1;">/ AR</span></div>
                <div style="display:flex; gap:1rem;">
                    <div style="position:relative; cursor:pointer;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <span style="position:absolute; top:-5px; right:-5px; background:var(--primary); color:#fff; font-size:0.6rem; font-weight:bold; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center;">3</span>
                    </div>
                    <div style="position:relative; cursor:pointer;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span style="position:absolute; top:-5px; right:-5px; background:var(--primary); color:#fff; font-size:0.6rem; font-weight:bold; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center;">3</span>
                    </div>
                </div>
                <div class="topbar-avatar" id="topbarAvatar" style="width:36px; height:36px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; cursor:pointer;" onclick="logout()" title="Déconnexion">YE</div>
            </div>
        </header>
        <main>
            <div class="page-header">
                <div>
                    <h2>Tableau de Bord</h2>
                    <p class="page-subtitle">Bienvenue, <strong id="welcomeName"></strong></p>
                </div>
                <div class="page-actions">
                    <button class="btn-primary" onclick="openTicketModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        Créer un Ticket
                    </button>
                </div>
            </div>

            <!-- Tickets Section (Page-like) -->
            <section style="background:#fff; border-radius:12px; border:1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow:hidden;">
                <div style="display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border);">
                    <div style="display:flex; gap:0.5rem;">
                        <button id="uTabAll" onclick="switchUserTab('all')" style="padding:0.45rem 1rem; border-radius:20px; border:none; font-size:0.8rem; font-weight:600; cursor:pointer; background:var(--primary); color:#fff;">Tous <span id="uCountAll" style="background:rgba(255,255,255,0.25); padding:0 6px; border-radius:10px; margin-left:4px; font-size:0.7rem;">0</span></button>
                        <button id="uTabOpen" onclick="switchUserTab('Ouvert')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">Ouverts</button>
                        <button id="uTabProgress" onclick="switchUserTab('En cours')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">En cours</button>
                        <button id="uTabResolved" onclick="switchUserTab('Resolu')" style="padding:0.45rem 1rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-secondary);">Résolus</button>
                    </div>
                    <button onclick="openTicketModal()" style="display:flex; align-items:center; gap:0.4rem; padding:0.45rem 1rem; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700; font-size:0.8rem; cursor:pointer;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Créer un ticket
                    </button>
                </div>
                <div id="myTicketsContainer" style="padding:0; max-height:500px; overflow-y:auto;"></div>
            </section>
        </main>
    </div>
</div>

<div class="modal-overlay" id="ticketModal">
    <div class="modal" style="max-width: 560px;">
        <div class="modal-header">
            <h3>Créer un Ticket</h3>
            <button class="modal-close" onclick="closeTicketModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <form id="ticketForm" onsubmit="handleCreateTicket(event)">
            <div class="form-group">
                <label for="ticketTitle">Titre du problème *</label>
                <input type="text" id="ticketTitle" placeholder="Ex: Problème de connexion VPN — réseau indisponible" required style="padding: 0.7rem 0.85rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem;">
            </div>

            <div class="form-group">
                <label>Catégorie *</label>
                <div id="catGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 0.25rem;">
                    <div class="cat-card active" data-type="Soft" onclick="selectCat(this)" style="display:flex; flex-direction:column; align-items:center; gap:0.4rem; padding:1rem 0.5rem; border:2px solid var(--primary); border-radius:10px; cursor:pointer; background:var(--primary-light); transition: all 0.15s;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <span style="font-size:0.78rem; font-weight:700; color:var(--primary);">Logiciel</span>
                    </div>
                    <div class="cat-card" data-type="Hard" onclick="selectCat(this)" style="display:flex; flex-direction:column; align-items:center; gap:0.4rem; padding:1rem 0.5rem; border:2px solid var(--border); border-radius:10px; cursor:pointer; background:#fff; transition: all 0.15s;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
                        <span style="font-size:0.78rem; font-weight:700; color:var(--text-secondary);">Hardware</span>
                    </div>
                    <div class="cat-card" data-type="Materiel" onclick="selectCat(this)" style="display:flex; flex-direction:column; align-items:center; gap:0.4rem; padding:1rem 0.5rem; border:2px solid var(--border); border-radius:10px; cursor:pointer; background:#fff; transition: all 0.15s;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span style="font-size:0.78rem; font-weight:700; color:var(--text-secondary);">Matériel</span>
                    </div>
                </div>
                <input type="hidden" id="ticketType" value="Soft">
            </div>

            <div class="form-group">
                <label for="ticketDesc">Description *</label>
                <textarea id="ticketDesc" placeholder="Décrivez le problème en détail : contexte, étapes pour reproduire, impact..." rows="4" required style="padding: 0.7rem 0.85rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem; resize: vertical;"></textarea>
            </div>

            <div class="form-row" style="gap: 1rem;">
                <div class="form-group flex-1">
                    <label for="ticketLevel">Niveau *</label>
                    <select id="ticketLevel" style="padding: 0.6rem 0.75rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem; background:#fff;">
                        <option value="Normal">Normal</option>
                        <option value="Eleve">Élevé</option>
                    </select>
                </div>
                <div class="form-group flex-1">
                    <label for="ticketPriority">Priorité *</label>
                    <select id="ticketPriority" style="padding: 0.6rem 0.75rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem; background:#fff;">
                        <option value="Basse">Basse</option>
                        <option value="Moyenne" selected>Moyenne</option>
                        <option value="Haute">Haute</option>
                        <option value="Critique">Critique</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 0.5rem;">
                <button type="button" onclick="closeTicketModal()" style="padding: 0.6rem 1.25rem; border-radius: 8px; border: 1px solid var(--border); background:#fff; color:var(--text-secondary); font-weight:600; cursor:pointer; font-size:0.85rem; display:flex; align-items:center; gap:0.4rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Annuler
                </button>
                <button type="submit" style="padding: 0.6rem 1.25rem; border-radius: 8px; border: none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; font-size:0.85rem;">
                    Soumettre le Ticket
                </button>
            </div>
        </form>
    </div>
</div>
<script>
function selectCat(el) {
    document.querySelectorAll('#catGrid .cat-card').forEach(function(c) {
        c.style.border = '2px solid var(--border)';
        c.style.background = '#fff';
        c.querySelector('svg').setAttribute('stroke', 'var(--text-secondary)');
        c.querySelector('span').style.color = 'var(--text-secondary)';
    });
    el.style.border = '2px solid var(--primary)';
    el.style.background = 'var(--primary-light)';
    el.querySelector('svg').setAttribute('stroke', 'var(--primary)');
    el.querySelector('span').style.color = 'var(--primary)';
    document.getElementById('ticketType').value = el.dataset.type;
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/tickets.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/main.js"></script>
<script src="../js/ticketDetail.js"></script>
<script>
    const user = checkAuth(['utilisateur']);
    if (user) {
        $('welcomeName').textContent = user.name;
        $('sidebarUser').textContent = user.name;
        $('sidebarRole').textContent = 'Utilisateur';
        
        $('sidebarAvatar').textContent = user.name.charAt(0);

        window.openTicketModal = function() {
            $('ticketModal').classList.add('active');
        };

        window.closeTicketModal = function() {
            $('ticketModal').classList.remove('active');
        };

        function handleCreateTicket(e) {
            e.preventDefault();
            const title = $('ticketTitle').value.trim();
            const desc = $('ticketDesc').value.trim();
            const type = $('ticketType').value;
            const level = $('ticketLevel').value;
            const priority = $('ticketPriority').value;
            if (!title || !desc) return;
            const ticket = createTicket(title, desc, user.name, type, level);
            ticket.priority = priority;
            const tickets = getTickets();
            const t = tickets.find(t => t.id === ticket.id);
            if (t) { t.priority = priority; }
            saveTickets(tickets);
            $('ticketForm').reset();
            closeTicketModal();
            loadMyTickets();
        }

        var userFilter = 'all';
        var userPage = 1;
        var userPageSize = 12;

        function loadMyTickets() {
            var tickets = getTicketsByUser(user.name);
            var container = $('myTicketsContainer');
            if($('uCountAll')) $('uCountAll').textContent = tickets.length;

            var filtered = userFilter === 'all' ? tickets : tickets.filter(function(t){return t.status===userFilter;});

            var totalPages = Math.ceil(filtered.length / userPageSize) || 1;
            if (userPage > totalPages) userPage = totalPages;

            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding:3rem; text-align:center; color:var(--text-muted); font-size:0.9rem;">Aucun ticket dans cette catégorie.</div>';
                return;
            }

            var paginated = filtered.slice((userPage - 1) * userPageSize, userPage * userPageSize);

            var html = '<table style="width:100%; border-collapse:collapse; font-size:0.85rem;">';
            html += '<thead><tr style="border-bottom:1px solid var(--border); text-align:left;"><th style="padding:0.75rem 1.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">N° TICKET</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">TITRE</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">DATE</th><th style="padding:0.75rem 0.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">TYPE</th><th style="padding:0.75rem 1.5rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">STATUT</th></tr></thead><tbody>';
            paginated.forEach(function(t) {
                var dateStr = t.createdAt.split(' ')[0];
                html += '<tr style="border-bottom:1px solid var(--border-light); transition:background 0.1s; cursor:pointer;" onmouseenter="this.style.background=\'var(--bg-alt)\'" onmouseleave="this.style.background=\'#fff\'" onclick="openTicketDetail(' + t.id + ', null)">';
                html += '<td style="padding:0.85rem 1.5rem; font-weight:600; color:var(--text-secondary);">#' + t.id.toString().slice(-4) + '</td>';
                html += '<td style="padding:0.85rem 0.5rem;"><div style="font-weight:600; color:var(--text);">' + t.title + '</div><div style="font-size:0.75rem; color:var(--text-muted); margin-top:1px; max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + t.description + '</div></td>';
                html += '<td style="padding:0.85rem 0.5rem; color:var(--text-secondary);">' + dateStr + '</td>';
                html += '<td style="padding:0.85rem 0.5rem; color:var(--text-secondary);">' + t.type + '</td>';
                html += '<td style="padding:0.85rem 1.5rem;">' + getStatusBadge(t.status) + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table>';

            // Pagination Controls
            if (totalPages > 1) {
                html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-top:1px solid var(--border); background:#fff;">';
                html += '<span style="font-size:0.8rem; color:var(--text-muted);">Affichage de ' + (((userPage-1)*userPageSize)+1) + ' à ' + Math.min(userPage*userPageSize, filtered.length) + ' sur ' + filtered.length + ' tickets</span>';
                html += '<div style="display:flex; gap:0.25rem;">';
                html += '<button onclick="changePageUser(' + (userPage-1) + ')" ' + (userPage===1?'disabled':'') + ' style="padding:0.4rem 0.75rem; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:'+(userPage===1?'default':'pointer')+'; color:var(--text-secondary); font-size:0.8rem;">Précédent</button>';
                
                var startP = Math.max(1, userPage - 2);
                var endP = Math.min(totalPages, userPage + 2);
                for(var p=startP; p<=endP; p++) {
                    var isAct = (p === userPage);
                    html += '<button onclick="changePageUser(' + p + ')" style="padding:0.4rem 0.75rem; border:1px solid '+(isAct?'var(--primary)':'var(--border)')+'; border-radius:6px; background:'+(isAct?'var(--primary)':'#fff')+'; cursor:pointer; color:'+(isAct?'#fff':'var(--text-secondary)')+'; font-weight:'+(isAct?'700':'400')+'; font-size:0.8rem;">'+p+'</button>';
                }

                html += '<button onclick="changePageUser(' + (userPage+1) + ')" ' + (userPage===totalPages?'disabled':'') + ' style="padding:0.4rem 0.75rem; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:'+(userPage===totalPages?'default':'pointer')+'; color:var(--text-secondary); font-size:0.8rem;">Suivant</button>';
                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        window.changePageUser = function(newPage) {
            userPage = newPage;
            loadMyTickets();
        };

        window.switchUserTab = function(status) {
            userFilter = status;
            var btns = [{id:'uTabAll',v:'all'},{id:'uTabOpen',v:'Ouvert'},{id:'uTabProgress',v:'En cours'},{id:'uTabResolved',v:'Resolu'}];
            btns.forEach(function(b) {
                var el = document.getElementById(b.id);
                if (el) { el.style.background = '#fff'; el.style.color = 'var(--text-secondary)'; el.style.border = '1px solid var(--border)'; }
            });
            var map = {all:'uTabAll',Ouvert:'uTabOpen','En cours':'uTabProgress',Resolu:'uTabResolved'};
            var active = document.getElementById(map[status]);
            if (active) { active.style.background = 'var(--primary)'; active.style.color = '#fff'; active.style.border = 'none'; }
            loadMyTickets();
        };

        loadMyTickets();

    }
</script>
</body>
</html>
