<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilisateur — Gestion des Problèmes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">GP</span>
            <h1>Gestion des Problèmes</h1>
            <button class="sidebar-toggle" title="Réduire/Agrandir">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="user-dashboard.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="9" width="7" height="12" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg>
                <span class="nav-label">Tableau de Bord</span>
            </a>
            <div class="nav-spacer"></div>
            <a href="#" onclick="logout()" class="logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Déconnexion</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <span id="sidebarUser"></span>
            <span class="sidebar-role" id="sidebarRole"></span>
        </div>
    </header>
    <div class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <h2 style="font-size:1rem;font-weight:700;">Tableau de Bord</h2>
            </div>
            <div class="topbar-right">
                <span class="role-badge role-user">Utilisateur</span>
                <button class="btn-primary btn-icon" onclick="openTicketModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    Nouveau Ticket
                </button>
                <div class="topbar-avatar" id="avatarInitial">U</div>
            </div>
        </div>
        <main class="page-container">
            <div class="page-header">
                <div>
                    <p class="page-subtitle">Bienvenue, <strong id="welcomeName"></strong></p>
                </div>
            </div>

            <div class="stats">
                <div class="card card-accent" style="--card-accent: var(--primary);">
                    <h3>Total Tickets</h3>
                    <div class="value" id="statTotal">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--warning);">
                    <h3>Ouverts / En cours</h3>
                    <div class="value" id="statOpen">0</div>
                </div>
                <div class="card card-accent" style="--card-accent: var(--success);">
                    <h3>Résolus</h3>
                    <div class="value" id="statResolved">0</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Évolution des tickets</h3>
                    <canvas id="userLineChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Répartition par statut</h3>
                    <canvas id="userPieChart"></canvas>
                </div>
            </div>

            <section class="card-section">
                <div class="section-header">
                    <h3>Mes Tickets</h3>
                    <span class="section-count" id="ticketCount">0</span>
                </div>
                <div id="myTicketsContainer">
                    <p class="empty-msg">Aucun ticket pour le moment.</p>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="ticketModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Créer un Ticket</h3>
                <button class="modal-close" onclick="closeTicketModal()">×</button>
            </div>
            <form id="ticketForm" onsubmit="handleCreateTicket(event)">
                <div class="form-group">
                    <label for="ticketTitle">Titre du problème</label>
                    <input type="text" id="ticketTitle" placeholder="Ex: Problème de connexion" required>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="ticketType">Type</label>
                        <select id="ticketType">
                            <option value="Soft">Soft</option>
                            <option value="Hard">Hard</option>
                            <option value="Materiel">Matériel</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="ticketLevel">Niveau</label>
                        <select id="ticketLevel">
                            <option value="Normal">Normal</option>
                            <option value="Eleve">Élevé</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="ticketPriority">Priorité</label>
                        <select id="ticketPriority">
                            <option value="Basse">Basse</option>
                            <option value="Moyenne" selected>Moyenne</option>
                            <option value="Haute">Haute</option>
                            <option value="Critique">Critique</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="ticketDesc">Description</label>
                    <textarea id="ticketDesc" placeholder="Décrivez le problème en détail..." rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-primary btn-full btn-icon" style="justify-content:center;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    Soumettre le Ticket
                </button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/tickets.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/charts.js"></script>
    <script>
        const user = checkAuth(['utilisateur']);
        if (user) {
            $('welcomeName').textContent = user.name;
            $('sidebarUser').textContent = user.name;
            $('sidebarRole').textContent = 'Utilisateur';
            $('avatarInitial').textContent = user.name.charAt(0).toUpperCase();

            window.openTicketModal = function () {
                $('ticketModal').classList.add('active');
            };
            window.closeTicketModal = function () {
                $('ticketModal').classList.remove('active');
            };

            function handleCreateTicket(e) {
                e.preventDefault();
                const title = $('ticketTitle').value.trim();
                const desc = $('ticketDesc').value.trim();
                const type = $('ticketType').value;
                const level = $('ticketLevel').value;
                const priority = $('ticketPriority').value;
                if (!title || !desc) return;
                const ticket = createTicket(title, desc, user.name, type, level);
                ticket.priority = priority;
                const tickets = getTickets();
                const t = tickets.find(t => t.id === ticket.id);
                if (t) t.priority = priority;
                saveTickets(tickets);
                $('ticketForm').reset();
                closeTicketModal();
                loadMyTickets();
            }

            function loadMyTickets() {
                const tickets = getTicketsByUser(user.name);
                const container = $('myTicketsContainer');
                $('ticketCount').textContent = tickets.length;
                $('statTotal').textContent = tickets.length;
                $('statOpen').textContent = tickets.filter(t => t.status === 'Ouvert' || t.status === 'En cours').length;
                $('statResolved').textContent = tickets.filter(t => t.status === 'Resolu').length;
                if (tickets.length === 0) {
                    container.innerHTML = '<p class="empty-msg">Aucun ticket pour le moment.</p>';
                    return;
                }
                let html = '<div class="tickets-grid">';
                const pColors = { 'Basse': '#6B7280', 'Moyenne': '#F59E0B', 'Haute': '#EA580C', 'Critique': '#DC2626' };
                const tColors = { 'Soft': '#B30016', 'Hard': '#EA580C', 'Materiel': '#8B5CF6' };
                const sColors = { 'Ouvert': '#B30016', 'En cours': '#F59E0B', 'Resolu': '#16A34A', 'Escalade': '#DC2626' };
                tickets.forEach(t => {
                    html += '<div class="ticket-card">' +
                        '<div class="ticket-card-top" style="background:' + (sColors[t.status] || '#64748B') + '"></div>' +
                        '<div class="ticket-card-body">' +
                            '<div class="ticket-card-header">' +
                                '<span class="ticket-card-title">' + t.title + '</span>' +
                                '<span class="ticket-card-id">#' + t.id.toString().slice(-4) + '</span>' +
                            '</div>' +
                            '<div class="ticket-card-desc">' + t.description + '</div>' +
                            '<div class="ticket-card-meta">' +
                                '<span class="badge" style="background:' + (tColors[t.type] || '#64748B') + '">' + t.type + '</span>' +
                                '<span class="badge" style="background:' + (pColors[t.priority] || '#64748B') + '">' + t.priority + '</span>' +
                                '<span class="badge" style="background:' + (sColors[t.status] || '#64748B') + '">' + t.status + '</span>' +
                            '</div>' +
                            '<div class="ticket-card-footer">' +
                                '<span class="ticket-card-date">' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                                    t.createdAt +
                                '</span>' +
                                '<span>' + (t.assignedTo || '—') + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                });
                html += '</div>';
                container.innerHTML = html;
            }

            function drawCharts() {
                const tickets = getTicketsByUser(user.name);
                const months = ['Jan','Fév','Mar','Avr','Mai','Juin'];
                const monthly = months.map(() => 0);
                tickets.forEach(t => {
                    const parts = t.createdAt.split('/');
                    if (parts.length === 3) {
                        const m = parseInt(parts[1], 10) - 1;
                        if (m >= 0 && m < 6) monthly[m]++;
                    }
                });
                drawLineChart('userLineChart', { labels: months, values: monthly }, '#B30016');

                const sColors = ['#B30016', '#F59E0B', '#16A34A', '#DC2626'];
                const statuses = ['Ouvert', 'En cours', 'Resolu', 'Escalade'];
                const counts = statuses.map(s => tickets.filter(t => t.status === s).length);
                drawPieChart('userPieChart', { labels: statuses, values: counts }, sColors);
            }

            loadMyTickets();
            drawCharts();
        }
    </script>
</body>
</html>
